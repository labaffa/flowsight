<div id="modal-overlay"></div>
<div class="d-flex flex-row p-4">

    <div id="oa-filter-bar" class="filter-bar" style="cursor: pointer;">
        <div class="filter-top">
            <div class="form-open">
                <div class="icon">
                    <img src="{{ url_for('static', path='img/plus-sign.svg') }}" alt="">
                </div>
                <input type="text" class="search-bar" placeholder="Build a query...">
            </div>
            <div class="datepicker d-flex">
                <div class="d-flex flex-fill calendar-icon">
                    <i class="fa fa-calendar"></i>&nbsp;
                    <i class="fa fa-caret-down"></i>
                </div>
                    <span  class="p-2"></span> 
            </div>
        </div>
        <div class="builder-container">
            <div class="query-builder">
                <div id="oa-query-form" class="query-form">
                </div>
                <div class="action-buttons">
                    <span popup-id="filters-pu" class="popup-trigger">
                        <svg class="info-icon info-icon-blue info-icon-xl" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 8a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-9.75 2.5a.75.75 0 0 0 0 1.5h3.5a.75.75 0 0 0 0-1.5h-1V7H7a.75.75 0 0 0 0 1.5h.25v2h-1ZM8 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/></svg>
                    </span>
                    <input type="button" id="oa-generate-query-button" class="query-button" value="Apply"/>
                    <input type="button" id="oa-reset-filters-button" class="reset-button" value="Reset"/>
                </div>
            </div>
        </div>
    </div>
