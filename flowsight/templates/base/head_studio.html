<!-- Metadata things found in the head tag -->
<title>{{ page_title or branding.meta_title }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script> 
    var version = JSON.parse('{{version|tojson}}'); 
    
</script>
<link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<link href="{{ url_for('static', path='/css/theme/theme.css').include_query_params(version=version) }}" rel="stylesheet">
<link href="{{ url_for('static', path='/css/virtual-select.min.css') }}" rel="stylesheet">
<link href="{{ url_for('static', path='/css/nav.css').include_query_params(version=version) }}" rel="stylesheet">
<link href="{{ url_for('static', path='/css/chart-style-studio.css').include_query_params(version=version) }}" rel="stylesheet">
<link href="{{ url_for('static', path='/css/flowsight.css').include_query_params(version=version) }}" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.4/css/dataTables.bootstrap5.min.css">
<!-- Specify body min-height to fill the page if not full already -->
<style>
    :root {
        --flowsight-nav-bg: {{ branding.colors.nav_bg }};
        --flowsight-surface: {{ branding.colors.surface }};
        --flowsight-page-bg: {{ branding.colors.page_bg }};
        --flowsight-page-bg-alt: {{ branding.colors.page_bg_alt }};
        --flowsight-accent: {{ branding.colors.accent }};
        --flowsight-accent-soft: {{ branding.colors.accent_soft }};
        --flowsight-accent-surface: {{ branding.colors.accent_surface }};
        --flowsight-button-text: {{ branding.colors.button_text }};
        --flowsight-text: {{ branding.colors.text }};
        --flowsight-muted: {{ branding.colors.muted }};
        --flowsight-card: {{ branding.colors.card }};
        --flowsight-border-subtle: {{ branding.colors.border_subtle }};
    }

    body {
        min-height: 100vh !important;
        min-height: -webkit-fill-available;
    }
</style>
