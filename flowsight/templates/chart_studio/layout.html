<!-- Country Specific page content in the results section -->

{% extends "base/main.html" %}

{% block content %}

<div class="d-flex flex-column flex-fill justify-content-center pg-content" style="width: 0;">
    <div class="d-flex flex-row justify-content-center border-bottom border-secondary country-header">
        <h2 class="fews-country popup-trigger" popup-id="main-pu">{{ branding.studio_label }}</h2>
        
    </div>
    <div class="container-fluid  remove-margin fews-tab-content">
            {% include "base/studio-filter-bar.html" %}
            <div class="d-flex flex-column flex-fill justify-content-center">
                <div class="row">
                    <div class="col-12 col-xl-3">
                        <div class="card no-max-height">
                            <div class="sub-condition">
                                <div class="field-header">
                                    <h5>Country</h5>
                                    <hr/>
                                </div>
                                <div class="studio-country-pill">{{ default_country.name }}</div>
                            </div>
                            <div id="chart-selector" class="sub-condition">
                                <div class="field-header">
                                    <h5>Chart Type
                                    <span popup-id="charts-pu" class="popup-trigger p-0">
                                        <svg class="info-icon" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 8a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-9.75 2.5a.75.75 0 0 0 0 1.5h3.5a.75.75 0 0 0 0-1.5h-1V7H7a.75.75 0 0 0 0 1.5h.25v2h-1ZM8 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="#fefefe"/></svg>
                                    </span>
                                    </h5>
                                    <hr/>
                                </div>
                                <select id="chart-select"></select>
                            </div>
                            <div id="available-fields" class="sub-condition">
                                <div class="field-header">
                                    <h5>Available fields
                                    <span popup-id="available-fields-pu" class="popup-trigger p-0">
                                        <svg class="info-icon" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 8a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-9.75 2.5a.75.75 0 0 0 0 1.5h3.5a.75.75 0 0 0 0-1.5h-1V7H7a.75.75 0 0 0 0 1.5h.25v2h-1ZM8 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="#fefefe"/></svg>
                                    </span>
                                    </h5>
                                    <hr/>
                                </div>
                                
                                <ul id="available-fields-list">
                                    
                                </ul>
                            </div>
                            <div id="selected-fields" class="sub-condition">
                                <div class="field-header">
                                    <h5>Selected fields
                                    <span popup-id="selected-fields-pu" class="popup-trigger p-0">
                                        <svg class="info-icon" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 8a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-9.75 2.5a.75.75 0 0 0 0 1.5h3.5a.75.75 0 0 0 0-1.5h-1V7H7a.75.75 0 0 0 0 1.5h.25v2h-1ZM8 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="#fefefe"/></svg>
                                    </span>
                                    </h5>
                                    <hr/>
                                </div>
                                
                                <ul id="selected-fields-list">
                                    
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-xl-6">
                        <div class="row">
                            <div 
                                class="card hcs justify-content-center align-items-center vh60" 
                                id="studio-chart"
                            >
                                <h3>Chart Studio</h3>
                            </div>
                            <div id="create-chart">
                                <input type="button" id="create-chart-button" class="query-button" value="Create"/>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12 col-xl-6">
                                <div class="card table-card" >
                                    <div class="d-flex highcharts-title pb-2">
                                
                                        <span class="hc-title">Social</span>
 
                                    </div>
                                    <div class="table-container" id="tg-messages"></div>
                                </div>
                            </div>
                            <div class="col-12 col-xl-6">
                                <div class="card table-card">
                                    <div class="d-flex highcharts-title pb-2">
                                
                                        <span class="hc-title">Media</span>
                
                                    </div>
                                    <div class="table-container" id="mc-stories"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-xl-3">
                        <div class="card no-max-height">
                            
                            <div id="available-variables" class="sub-condition">
                                <div class="field-header">
                                    <h5>Available Variables</h5>
                                    <hr/>
                                </div>
                                
                                <ul id="available-variables-list">
                                    
                                </ul>
                            </div>
                            <div id="selected-variables" class="sub-condition">
                                <div class="field-header">
                                    <h5>Selected Variables</h5>
                                    <hr/>
                                </div>
                                
                                <ul id="selected-variables-list">
                                    
                                </ul>
                            </div>
                        </div>
                    </div>
                
                </div>

            </div>   
    </div>
</div>

{% endblock content %}
