<div id="modal-overlay"></div>
<div class="d-flex flex-row p-4">
    <div id="studio-filter-bar" class="filter-bar" style="cursor: pointer;">
        <div class="filter-top">
            <div class="form-open">
                <span class="icon">
                    <img src="{{ url_for('static', path='img/plus-sign.svg') }}" alt="">
                </span>
                <input type="text" class="search-bar" placeholder="Build a query...">
            </div>
            <div class="datepicker d-flex">
                <div class="d-flex flex-fill calendar-icon">
                    <i class="fa fa-calendar"></i>&nbsp;
                    <i class="fa fa-caret-down"></i>
                </div>
                <span  class="p-2"></span> 
            </div>
        </div>
        <div class="builder-container">
            <div class="query-builder">
                <div id="studio-query-form" class="query-form">
                </div>
                <div class="action-buttons">    
                    <input type="button" id="studio-generate-query-button" class="query-button" value="Generate Query"/>
                    <input type="button" id="studio-reset-filters-button" class="reset-button" value="Reset"/>
                </div>
            </div>
        </div>
    </div>
</div>
